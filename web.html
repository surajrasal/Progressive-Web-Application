<!DOCTYPE html>
<html>
<head>
    <title>PWA E-Commerce</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 15px;
        }
        .container {
            padding: 20px;
        }
        .product {
            background: white;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
        }
        button {
            padding: 8px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #cart {
            margin-top: 20px;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My PWA Store</h1>
</header>

<div class="container">

    <div class="product">
        <h3>Mobile</h3>
        <p>₹10000</p>
        <button onclick="addToCart('Mobile')">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Laptop</h3>
        <p>₹50000</p>
        <button onclick="addToCart('Laptop')">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Headphones</h3>
        <p>₹2000</p>
        <button onclick="addToCart('Headphones')">Add to Cart</button>
    </div>

    <div id="cart">
        <h3>Cart Items</h3>
        <ul id="cartList"></ul>
    </div>

</div>

<script>
    let cart = [];

    function addToCart(item) {
        cart.push(item);
        displayCart();
    }

    function displayCart() {
        let list = document.getElementById("cartList");
        list.innerHTML = "";
        cart.forEach(i => {
            let li = document.createElement("li");
            li.innerText = i;
            list.appendChild(li);
        });
    }

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("SW Registered"));
    }
</script>

</body>
</html>
